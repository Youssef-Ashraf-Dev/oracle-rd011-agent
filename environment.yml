name: rd011-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - graphviz            # Installs the dot.exe binary required for diagram rendering
  - pip
  - pip:
      # ── LangGraph + LangChain ──
      - langgraph>=0.2.0
      - langgraph-checkpoint-sqlite>=2.0.0
      - langchain>=0.2.0
      - langchain-chroma>=0.1.0
      - langchain-community>=0.2.0
      - langchain-google-genai>=1.0.0
      - langchain-groq>=0.1.0
      - langchain-openai>=0.1.0
      - sentence-transformers>=3.0.0

      # ── Document generation ──
      - python-docx>=1.1.0
      - openpyxl>=3.1.0

      # ── Diagram rendering ──
      - Pillow>=10.0.0

      # ── UI & Core Utilities ──
      - streamlit>=1.35.0
      - nest-asyncio>=1.6.0
      - python-dotenv>=1.0.0
      - pydantic>=2.0.0

      # ── Testing ──
      - pytest>=8.0.0
